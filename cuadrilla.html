  var errEl=document.getElementById('mod-err');
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}

  try{
    var otId=MOD_OT.ot.id;
    var cuadId=CUAD.id;
    var hayAlgo=false;

    // ── MATERIALES ────────────────────────────────────────────────────────────
    // MODELO DIFERIDO (Etapa 2.1): la corrección post-cierre solo modifica
    // ot_materiales_usados (cantidad / activo). NO toca stock_cuadrillas ni
    // movimientos_stock. El descuento real lo hace la validación admin (Etapa 2.2)
    // sobre los valores corregidos.
    for(var i=0;i<MOD_OT.mats.length;i++){
      var m=MOD_OT.mats[i];
      var cantVieja=m.cantidad;
      var cantNueva=MOD_OT.edMats[m.id]??cantVieja;
      if(cantNueva===cantVieja)continue;
      hayAlgo=true;
      var matId=m.catalogo_materiales?.id||m.material_id;
      var nomMat=m.catalogo_materiales?.nombre||String(matId);

      if(cantNueva===0){
        // Soft delete (preserva trazabilidad)
        await sbPatch('ot_materiales_usados','?id=eq.'+m.id,{activo:false,cantidad:0});
      }else{
        await sbPatch('ot_materiales_usados','?id=eq.'+m.id,{cantidad:cantNueva});
      }

      await _registrarCambioTec(otId,'material:'+nomMat,cantVieja,cantNueva);
    }

    // ── MANO DE OBRA ──────────────────────────────────────────────────────────
    for(var j=0;j<MOD_OT.servs.length;j++){
      var s=MOD_OT.servs[j];
      var sqVieja=s.cantidad;
      var sqNueva=MOD_OT.edServs[s.id]??sqVieja;
      if(sqNueva===sqVieja)continue;
      hayAlgo=true;
      var nomServ=s.catalogo_servicios?.nombre||String(s.servicio_id);
      if(sqNueva===0){
        await sbPatch('ot_servicios_realizados','?id=eq.'+s.id,{activo:false,cantidad:0});
      }else{
        await sbPatch('ot_servicios_realizados','?id=eq.'+s.id,{cantidad:sqNueva});
      }
      await _registrarCambioTec(otId,'servicio:'+nomServ,sqVieja,sqNueva);
    }

    // ── EQUIPO INSTALADO y SERIAL RETIRADO ────────────────────────────────────
    var patchOT={};
    var eqViej=MOD_OT.ot.equipo_instalado||'';
    var eqNuev=MOD_OT.edEquipo||'';
    var srViej=MOD_OT.ot.serial_retirado||'';
    var srNuev=MOD_OT.edSerial||'';
    if(eqNuev!==eqViej){patchOT.equipo_instalado=eqNuev||null;hayAlgo=true;await _registrarCambioTec(otId,'equipo_instalado',eqViej,eqNuev);}
    if(srNuev!==srViej){patchOT.serial_retirado=srNuev||null;hayAlgo=true;await _registrarCambioTec(otId,'serial_retirado',srViej,srNuev);}

    if(!hayAlgo){
      if(errEl){errEl.textContent='⚠️ No hiciste ningún cambio.';errEl.style.display='block';}
      if(btn){btn.disabled=false;btn.textContent='💾 Guardar cambios';}
      return;
    }

    // ── MARCAR OT COMO MODIFICADA POST-CIERRE ─────────────────────────────────
    patchOT.modificada_post_cierre=true;
    await sbPatch('ordenes_trabajo','?id=eq.'+otId,patchOT);

    // Recargar grupos y volver
    await cargarGrupos();
    cerrarModificacion();
    var msgMod='✅ Cambios guardados correctamente.';
    alert(msgMod);

  }catch(e){
    if(errEl){errEl.textContent='Error al guardar: '+e.message;errEl.style.display='block';}
    if(btn){btn.disabled=false;btn.textContent='💾 Guardar cambios';}
    console.error('[guardarModificacion]',e);
  }
}

function cerrarModificacion(){
  MOD_OT=null;
  document.getElementById('s-mod-ot').style.display='none';
  document.getElementById('s-grupo').style.display='block';
  var cl=GRUPO_ACTIVO&&GRUPO_ACTIVO.ordenes_trabajo&&GRUPO_ACTIVO.ordenes_trabajo[0]?GRUPO_ACTIVO.ordenes_trabajo[0].clientes||{}:{};
  document.getElementById('topbar-title').textContent=((cl.apellido||'')+(cl.nombre?' '+cl.nombre:'')).trim()||'Cliente';
  renderGrupo();
}

function salir(){
  if(!confirm('¿Salir de la app?'))return;
  sessionStorage.removeItem('fg_cuad');
  CUAD=null;GRUPOS=[];GRUPO_ACTIVO=null;FILTRO='';
  document.getElementById('s-app').style.display='none';
  document.getElementById('s-lista').style.display='block';
  document.getElementById('s-grupo').style.display='none';
  document.getElementById('s-rechazo').style.display='none';
  document.getElementById('s-wizard').style.display='none';
  document.getElementById('btn-volver').style.display='none';
  document.getElementById('s-login').style.display='flex';
  ['pin0','pin1','pin2','pin3'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('l-err').textContent='';
}

// ── PIN ────────────────────────────────────────────────────────────────────────
function initPinNav(){
  var ids=['pin0','pin1','pin2','pin3'];
  ids.forEach(function(id,i){
    var el=document.getElementById(id);
    el.addEventListener('input',function(){
      var v=el.value.replace(/[^0-9]/g,'');
      el.value=v.slice(-1);
      if(v&&i<3)document.getElementById(ids[i+1]).focus();
      if(i===3&&v)document.getElementById('btn-ingresar').focus();
    });
    el.addEventListener('keydown',function(e){
      if(e.key==='Backspace'&&!el.value&&i>0)document.getElementById(ids[i-1]).focus();
      if(e.key==='Enter')doLogin();
    });
  });
}

// ── ARRANQUE ───────────────────────────────────────────────────────────────────
window.addEventListener('load',async function(){
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw-cuad.js').catch(function(){});
  initPinNav();
  await cargarCuadrillasLogin();
  try{
    var saved=sessionStorage.getItem('fg_cuad');
    if(saved){CUAD=JSON.parse(saved);iniciarApp();}
  }catch(e){}
});
</script>
